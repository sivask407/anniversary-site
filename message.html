<!DOCTYPE html>
<html>
<head>
<style>
body {
    margin: 0;
    height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;

    background: linear-gradient(to right, #ffffff, #ffe6f0);
    font-family: 'Segoe UI', cursive;
    text-align: center;
}

h1 {
    color: #ff4d6d;
    font-size: 28px;
    animation: fadeIn 2s;
}

button {
    margin-top: 30px;
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    background: #ff4d6d;
    color: white;
    font-size: 16px;
    cursor: pointer;
    animation: fadeIn 3s;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px);}
    to { opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<h1>
In my life…
you are the best thing that ever happened to me 💗
</h1>

<button onclick="nextPage()">See how I see you ❤️</button>

<script>
function nextPage(){
    window.location.href = "memories.html";
}
</script>
</body>
</html>
